version: 1

source_policy:
  default_language: en
  target_audience: "Amazon US sellers"
  max_items_per_run: 80
  max_age_hours:
    breaking_news: 72
    policy_update: 168
    evergreen_blog: 720
  require_source_fields:
    - name
    - type
    - priority
    - category
  dedupe_by:
    - url
    - title
  scoring_hints:
    official_policy: 1.3
    amazon_rufus: 1.4
    amazon_ads: 1.25
    ai_search_geo: 1.2
    seller_forum: 1.1
    generic_blog: 0.7
    # 中文行业新闻适合发现选题，但权重不得高于 Amazon/Google 官方源
    chinese_crossborder_news: 1.05
    # 中文报告类可略高：可能带来趋势/选品信息增量
    chinese_crossborder_report: 1.1

sources:
  official_amazon:
    description: "Amazon 官方与半官方信息源，优先用于政策、广告、Rufus、平台动态核查。"
    items:
      - name: "Amazon Seller Central News"
        type: "fetch_page"
        category: "official_policy"
        priority: "high"
        url: "https://sellercentral.amazon.com/news"
        requires_auth: true
        freshness: "policy_update"
        use_case:
          - "seller policy update"
          - "account health"
          - "FBA fee"
          - "listing requirement"
        notes: "Seller Central News 可能需要登录；不要假设有公开 RSS。"

      - name: "Amazon Seller Forums - Announcements"
        type: "fetch_page"
        category: "seller_forum"
        priority: "high"
        url: "https://sellercentral.amazon.com/seller-forums"
        requires_auth: false
        freshness: "breaking_news"
        use_case:
          - "seller complaints"
          - "policy rollout"
          - "early issue detection"
        notes: "用于发现卖家反馈和政策灰度变化；事实发布前必须再找官方来源核查。"

      - name: "Amazon Ads Blog"
        type: "fetch_page"
        category: "amazon_ads"
        priority: "high"
        url: "https://advertising.amazon.com/blog"
        requires_auth: false
        freshness: "policy_update"
        use_case:
          - "Amazon Ads update"
          - "Sponsored Products"
          - "DSP"
          - "PPC strategy"

      - name: "Amazon Ads Resources Library"
        type: "fetch_page"
        category: "amazon_ads"
        priority: "medium"
        url: "https://advertising.amazon.com/resources/library"
        requires_auth: false
        freshness: "policy_update"
        use_case:
          - "advertising guide"
          - "case study"
          - "PPC optimization"



      - name: "About Amazon News"
        type: "rss"
        category: "amazon_corporate_news"
        priority: "medium"
        url: "https://www.aboutamazon.com/news/feed"
        site_url: "https://www.aboutamazon.com/news"
        requires_auth: false
        freshness: "breaking_news"
        use_case:
          - "Amazon AI"
          - "Amazon retail"
          - "Amazon corporate announcement"
          - "Rufus related news"
        notes: "公司新闻源，不等同 Seller Central 政策源。"

  marketplace_news:
    description: "电商平台、Amazon marketplace、卖家生态新闻。"
    items:
      - name: "Marketplace Pulse Articles"
        type: "atom"
        category: "marketplace_news"
        priority: "high"
        url: "https://www.marketplacepulse.com/articles/recent.atom"
        site_url: "https://www.marketplacepulse.com/articles"
        requires_auth: false
        freshness: "breaking_news"
        feed_verified_at: "2026-06-04"
        feed_discovered_by: "scripts/discover_feeds.js"
        fallback_type: "fetch_page"
        use_case:
          - "Amazon marketplace trend"
          - "seller economics"
          - "marketplace data"
        notes: "文章 feed（Recent Articles），不等于官方政策源。Feed was auto-discovered and verified locally; if feed fails, fallback to site_url fetch."





  seo_geo_ai_search:
    description: "SEO、GEO、AI Overview、搜索算法、生成式搜索相关信息源。"
    items:
      - name: "Google Search Central Blog"
        type: "atom"
        category: "official_search"
        priority: "high"
        url: "https://developers.google.com/search/blog/atom.xml"
        site_url: "https://developers.google.com/search/blog"
        requires_auth: false
        freshness: "policy_update"
        use_case:
          - "Google Search update"
          - "helpful content"
          - "structured data"
          - "AI search visibility"


      - name: "Search Engine Journal"
        type: "rss"
        category: "seo_news"
        priority: "high"
        url: "https://www.searchenginejournal.com/feed/"
        site_url: "https://www.searchenginejournal.com/"
        requires_auth: false
        freshness: "breaking_news"
        use_case:
          - "SEO"
          - "AI search"
          - "content quality"
          - "Google update"

      - name: "Search Engine Roundtable"
        type: "rss"
        category: "seo_news"
        priority: "high"
        url: "https://www.seroundtable.com/index.rdf"
        site_url: "https://www.seroundtable.com/"
        requires_auth: false
        freshness: "breaking_news"
        use_case:
          - "Google ranking volatility"
          - "SEO community signal"
          - "algorithm update"
        notes: "适合发现快速 SEO 动态，但发布前需要结合官方来源核查。"

      - name: "Google AI Blog"
        type: "discover_feed_or_fetch"
        category: "ai_search_geo"
        priority: "medium"
        url: "https://blog.google/technology/ai/"
        requires_auth: false
        freshness: "policy_update"
        use_case:
          - "Google AI"
          - "AI Overviews"
          - "Gemini"
          - "AI search"

      - name: "Perplexity Blog"
        type: "discover_feed_or_fetch"
        category: "ai_search_geo"
        priority: "medium"
        url: "https://www.perplexity.ai/hub/blog"
        requires_auth: false
        freshness: "policy_update"
        use_case:
          - "answer engine"
          - "GEO"
          - "AI citation"
        notes: "Returned 403 during feed discovery (2026-06-04); may require browser-like fetch or manual search query fallback."

  amazon_seller_tools_blogs:
    description: "卖家工具、PPC 工具、选品工具博客，适合做方法论和选题辅助，不作为政策事实唯一来源。"
    items:
      - name: "Jungle Scout Blog"
        type: "discover_feed_or_fetch"
        category: "seller_tool_blog"
        priority: "medium"
        url: "https://www.junglescout.com/blog/"
        requires_auth: false
        freshness: "evergreen_blog"
        use_case:
          - "product research"
          - "Amazon seller guide"
          - "category trend"

      - name: "Helium 10 Blog"
        type: "discover_feed_or_fetch"
        category: "seller_tool_blog"
        priority: "medium"
        url: "https://www.helium10.com/blog/"
        requires_auth: false
        freshness: "evergreen_blog"
        use_case:
          - "keyword research"
          - "listing optimization"
          - "Amazon seller guide"
        notes: "Feed link https://www.helium10.com/feed/ was discovered but verification timed out twice (2026-06-04); keep discover_feed_or_fetch until verified."

      - name: "SellerApp Blog"
        type: "rss"
        category: "seller_tool_blog"
        priority: "low"
        url: "https://www.sellerapp.com/blog/feed/"
        site_url: "https://www.sellerapp.com/blog/"
        requires_auth: false
        freshness: "evergreen_blog"
        feed_verified_at: "2026-06-04"
        feed_discovered_by: "scripts/discover_feeds.js"
        fallback_type: "fetch_page"
        notes: "Feed was auto-discovered and verified locally; if feed fails, fallback to site_url fetch."
        use_case:
          - "Amazon PPC"
          - "Amazon SEO"
          - "listing optimization"

      - name: "Teikametrics Blog"
        type: "rss"
        category: "amazon_ads"
        priority: "medium"
        url: "https://www.teikametrics.com/feed/"
        site_url: "https://www.teikametrics.com/blog/"
        requires_auth: false
        freshness: "evergreen_blog"
        feed_verified_at: "2026-06-04"
        feed_discovered_by: "scripts/discover_feeds.js"
        fallback_type: "fetch_page"
        notes: "Feed was auto-discovered and verified locally; if feed fails, fallback to site_url fetch."
        use_case:
          - "Amazon advertising"
          - "PPC"
          - "marketplace optimization"

      - name: "Ad Badger Blog"
        type: "rss"
        category: "amazon_ads"
        priority: "medium"
        url: "https://www.adbadger.com/feed/"
        site_url: "https://www.adbadger.com/blog/"
        requires_auth: false
        freshness: "evergreen_blog"
        feed_verified_at: "2026-06-04"
        feed_discovered_by: "scripts/discover_feeds.js"
        fallback_type: "fetch_page"
        notes: "Feed was auto-discovered and verified locally; if feed fails, fallback to site_url fetch."
        use_case:
          - "Amazon PPC"
          - "ACoS"
          - "bid optimization"

      - name: "Intentwise Blog"
        type: "rss"
        category: "amazon_ads"
        priority: "medium"
        url: "https://www.intentwise.com/blog/feed/"
        site_url: "https://www.intentwise.com/blog/"
        requires_auth: false
        freshness: "evergreen_blog"
        feed_verified_at: "2026-06-04"
        feed_discovered_by: "scripts/discover_feeds.js"
        fallback_type: "fetch_page"
        notes: "Feed was auto-discovered and verified locally; if feed fails, fallback to site_url fetch."
        use_case:
          - "Amazon Ads"
          - "retail media"
          - "advertising analytics"

  community_signals:
    description: "社区信号源，只用于发现问题和选题，不作为事实依据。"
    # 社区源（Reddit 等）已于 2026-06-06 全部停用并清理，需要时在此重新添加
    items:


  chinese_crossborder_news:
    description: "中文跨境电商行业源，主要用于选题发现、中文卖家痛点、行业热点追踪，不作为最终事实唯一来源。"
    items:


      - name: "AMZ123 - 跨境快讯"
        type: "fetch_page"
        category: "chinese_crossborder_news"
        priority: "high"
        url: "https://www.amz123.com/kx"
        site_url: "https://www.amz123.com/kx"
        language: "zh-CN"
        requires_auth: false
        freshness: "breaking_news"
        use_case:
          - "快讯"
          - "平台动态"
          - "卖家风险"
          - "热点监控"
        notes: "适合发现短时热点；写文前必须二次核查。"








  search_queries:
    description: "没有稳定 RSS 的专题，用搜索 query 做每日发现。"
    items:
      - name: "Amazon Rufus seller news"
        type: "search_query"
        category: "amazon_rufus"
        priority: "high"
        query: "Amazon Rufus seller OR marketplace OR listing"
        freshness: "breaking_news"
        use_case:
          - "Rufus update"
          - "AI shopping"
          - "Amazon seller impact"



      - name: "Google AI Overview SEO"
        type: "search_query"
        category: "ai_search_geo"
        priority: "high"
        query: "Google AI Overview SEO visibility citation"
        freshness: "breaking_news"
        use_case:
          - "GEO"
          - "AI citation"
          - "search traffic"

      - name: "Amazon seller policy update"
        type: "search_query"
        category: "official_policy"
        priority: "high"
        query: "Amazon seller policy update FBA fee listing requirement"
        freshness: "breaking_news"
        use_case:
          - "seller policy"
          - "FBA"
          - "account health"


topic_filters:
  include_keywords:
    - "Amazon Rufus"
    - "Rufus"
    - "Researched by AI"
    - "Amazon AI"
    - "AI shopping"
    - "Amazon seller"
    - "Seller Central"
    - "Listing"
    - "PPC"
    - "ACoS"
    - "Sponsored Products"
    - "FBA"
    - "Google AI Overview"
    - "GEO"
    - "generative engine optimization"
    - "AI search"
    - "structured data"
    - "helpful content"
    # Amazon AI Shopping 口径（2026-05 Rufus 整合为 Alexa for Shopping）
    - "Alexa for Shopping"
    - "Amazon AI Shopping"
    - "AI shopping assistant"
    - "Rufus renamed"
    - "Amazon Shopping AI"
    - "商品页 AI Overviews"
    - "亚马逊 AI 购物助手"
    - "亚马逊 AI 搜索"
    # 中文关键词（chinese_crossborder_news 源）
    - "亚马逊"
    - "亚马逊卖家"
    - "跨境电商"
    - "卖家"
    - "广告"
    - "选品"
    - "关键词"
    - "自然流量"
    - "转化率"
    - "封号"
    - "账号健康"
    - "库存"
    - "旺季"
    - "Prime Day"
    - "黑五"
    - "AI"

  exclude_keywords:
    - "coupon only"
    - "single product discount"
    - "celebrity shopping"
    - "warehouse jobs"
    - "Prime Video"
    - "Kindle book deal"
    - "AWS outage unless seller impact"
    # 中文排除词
    - "纯招商广告"
    - "服务商软文"
    - "会议招商"
    - "平台招商会"
    - "无关平台融资"
    - "招聘"
    - "活动报名"

quality_rules:
  source_trust:
    official_policy:
      can_be_primary_fact_source: true
      needs_cross_check: false
    amazon_ads:
      can_be_primary_fact_source: true
      needs_cross_check: false
    seo_news:
      can_be_primary_fact_source: false
      needs_cross_check: true
    seller_tool_blog:
      can_be_primary_fact_source: false
      needs_cross_check: true
    seller_community:
      can_be_primary_fact_source: false
      needs_cross_check: true
    search_query:
      can_be_primary_fact_source: false
      needs_cross_check: true
    chinese_crossborder_news:
      can_be_primary_fact_source: false
      needs_cross_check: true
    chinese_crossborder_report:
      can_be_primary_fact_source: false
      needs_cross_check: true

  publishing_constraints:
    - "任何 Amazon 官方政策、费率、账号规则，必须优先引用 Amazon 官方来源。"
    - "社区和工具博客只能用于发现选题，不能作为最终事实依据。"
    - "涉及 Rufus、COSMO、AI Overview 的机制，不允许写成确定性算法结论。"
    - "没有来源的数字不能写成事实。"
