# 模型配置 — Content Generation Engine

generation_strategies:
  default: balanced
  supported:
    - balanced
    - seo_first
    - geo_first

# 当前单模型；每个 task_type 保持数组形状，便于后续按真实实现扩展。

# ---- 执行器（providers）----
# 当前已实现生产路径 = openclaw_cli。
providers:
  openclaw_cli:
    type: cli
    command: openclaw
    enabled: true

default:
  provider: openclaw_cli
  model: flyposter-ai/gpt-5.5
  thinking: off

article_generation:
  - name: gpt-5.5
    provider: openclaw_cli
    model: flyposter-ai/gpt-5.5
    enabled: true

topic_generation:
  - name: gpt-5.5
    provider: openclaw_cli
    model: flyposter-ai/gpt-5.5
    enabled: true

fact_check:
  - name: gpt-5.5
    provider: openclaw_cli
    model: flyposter-ai/gpt-5.5
    enabled: true

channel_repurpose:
  - name: gpt-5.5
    provider: openclaw_cli
    model: flyposter-ai/gpt-5.5
    enabled: true

# 内容分类（content_type / business_category / topic_cluster）：轻量任务，批量分类
content_classification:
  - name: gpt-5.5
    provider: openclaw_cli
    model: flyposter-ai/gpt-5.5
    enabled: true

# 选题内容价值评分（独立于 SEO/GEO 的「值不值得写」判断）：批量轻量任务
topic_value_score:
  - name: gpt-5.5
    provider: openclaw_cli
    model: flyposter-ai/gpt-5.5
    enabled: true

# 文章质量主评分（>=80 才能进终审；SEO/GEO 不能覆盖）
article_quality_score:
  - name: gpt-5.5
    provider: openclaw_cli
    model: flyposter-ai/gpt-5.5
    enabled: true
